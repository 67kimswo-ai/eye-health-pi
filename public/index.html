<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="description" content="눈 건강을 지키고 PI를 받으세요" />
  <title>아이케어 파이 👁️</title>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script>
    async function initPiSdk() {
      try {
        const response = await fetch('/validation-key.txt');
        if (response.ok) {
          const validationKey = (await response.text()).trim();
          if (validationKey) {
            console.log('[Pi SDK] validation-key.txt 로드 성공');
            Pi.init({ version: '2.0', validationKey });
            return;
          }
        }
        console.warn('[Pi SDK] validation-key.txt 없음, 기본 설정 사용');
        Pi.init({ version: '2.0' });
      } catch (error) {
        console.error('[Pi SDK] 초기화 오류:', error);
        Pi.init({ version: '2.0' });
      }
    }
    if (typeof Pi !== 'undefined') {
      initPiSdk();
    } else {
      console.warn('[Pi SDK] Pi 객체가 아직 로드되지 않음');
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e1a; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
